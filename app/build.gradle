plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'java-library'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
    maven {
        url = "https://frcmaven.wpi.edu/artifactory/release/"
    }
}

dependencies {
    // --- CORE WPILIB & MATH ---
    api 'edu.wpi.first.wpilibj:wpilibj-java:2026.+'
    api 'edu.wpi.first.wpimath:wpimath-java:2026.+'
    api 'edu.wpi.first.wpiutil:wpiutil-java:2026.+'

    // --- COMMANDS & NETWORK TABLES ---
    api 'edu.wpi.first.wpilibNewCommands:wpilibNewCommands-java:2026.+'
    api 'edu.wpi.first.ntcore:ntcore-java:2026.+'
    api 'edu.wpi.first.hal:hal-java:2026.+'

    // --- VISION & APRILTAGS ---
    // Gives you access to AprilTagFields, AprilTagDetector, and photonvision-adjacent types
    api 'edu.wpi.first.apriltag:apriltag-java:2026.+'
    api 'edu.wpi.first.cameraserver:cameraserver-java:2026.+'
    api 'edu.wpi.first.cscore:cscore-java:2026.+'

    // --- TESTING FRAMEWORK ---
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}
